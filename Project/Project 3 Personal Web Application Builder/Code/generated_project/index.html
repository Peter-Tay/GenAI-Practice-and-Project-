<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div id="calculator" class="calculator">
        <div id="display" class="display"></div>
        <div class="buttons-grid">
            <!-- Row 1 -->
            <button id="btn-7" data-action="digit">7</button>
            <button id="btn-8" data-action="digit">8</button>
            <button id="btn-9" data-action="digit">9</button>
            <button id="btn-divide" data-action="operator">/</button>

            <!-- Row 2 -->
            <button id="btn-4" data-action="digit">4</button>
            <button id="btn-5" data-action="digit">5</button>
            <button id="btn-6" data-action="digit">6</button>
            <button id="btn-multiply" data-action="operator">*</button>

            <!-- Row 3 -->
            <button id="btn-1" data-action="digit">1</button>
            <button id="btn-2" data-action="digit">2</button>
            <button id="btn-3" data-action="digit">3</button>
            <button id="btn-subtract" data-action="operator">-</button>

            <!-- Row 4 -->
            <button id="btn-0" data-action="digit">0</button>
            <button id="btn-decimal" data-action="decimal">.</button>
            <button id="btn-clear" data-action="clear">C</button>
            <button id="btn-add" data-action="operator">+</button>

            <!-- Row 5 -->
            <button id="btn-backspace" data-action="backspace">⌫</button>
            <button id="btn-equals" data-action="equals">=</button>
        </div>
    </div>
</body>
</html>
